name: splice
description: "Splice - rotating wheel of colored segments. Tap when target color crosses the notch."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.5
dependencies:
  flutter: { sdk: flutter }
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
dev_dependencies:
  flutter_test: { sdk: flutter }
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
flutter:
  uses-material-design: true
  assets:
    - assets/sfx.wav
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#191919"
  adaptive_icon_foreground: "assets/icon.png"
